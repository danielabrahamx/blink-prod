services:
  db:
    image: postgres:16-alpine
    container_name: blink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blink
    ports:
      - "5433:5432"
    volumes:
      - blink-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blink"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  blink-pgdata:
