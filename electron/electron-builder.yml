appId: com.sibrox.blink
productName: Blink
copyright: Copyright (c) 2026 Sibrox
directories:
  output: dist-installer
  buildResources: resources
files:
  - out/**/*
  - package.json
  - "!**/*.{md,markdown,ts,map}"
  - "!**/*.test.*"
asar: true
asarUnpack:
  - "**/*.node"
win:
  target:
    - target: nsis
      arch: x64
  icon: resources/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}
  signAndEditExecutable: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Blink
  createDesktopShortcut: true
  createStartMenuShortcut: true
mac:
  identity: null
publish: null
